configVersion: 0.1.3
app:
  httpWeb:
    enabled: true
    auth:
      enabled: true
    host:
      address: "[::]"
      port: 7080
    skin: default
  dnsProxy:
    host:
      address: "[::]"
      port: 3553
    upstream:
      address: 127.0.0.1
      port: 53
    # protocol: plain | dot | doh
    # Examples:
    #   DoT (Cloudflare): protocol: dot, address: 1.1.1.1, port: 853, tlsServerName: cloudflare-dns.com
    #   DoH (Google):     protocol: doh, url: https://dns.google/dns-query
    #   DoH (Cloudflare): protocol: doh, url: https://cloudflare-dns.com/dns-query
    # tlsSkipVerify: false
    # tlsServerName: ""
    disableRemap53: false
    disableFakePTR: false
    disableDropAAAA: false
    maxIdleConns: 10
    maxConcurrent: 100
    timeout: 5000
  netfilter:
    iptables:
      chainPrefix: MT_
    ipset:
      tablePrefix: mt_
      additionalTTL: 3600
    disableIPv4: false
    disableIPv6: false
    startMarkTableIndex: 1298229097
  link:
    - br0
  showAllInterfaces: false
  logLevel: info
groups:
  - id: d663876a
    name: Example
    interface: nwg0
    enable: false
    rules:
      - id: 6f34ee91
        name: Wildcard Example
        type: wildcard
        rule: '*wildcard.example.com'
        enable: true
      - id: 00ae5f7c
        name: RegEx Example
        type: regex
        rule: '^.*.regex.example.com$'
        enable: true
      - id: 6120dc8a
        name: Domain Example
        type: domain
        rule: 'domain.example.com'
        enable: true
      - id: b9751782
        name: Namespace Example
        type: namespace
        rule: 'namespace.example.com'
        enable: true
